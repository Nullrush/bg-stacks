<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Gravatar Default Styles</title>
  <style>
    :root { --bg: #f5f5f5; --card: #fff; --text: #111; --muted: #555; --hash: #999; --shadow: rgba(0,0,0,.1); }
    [data-theme="dark"] { --bg: #1a1a1a; --card: #2a2a2a; --text: #eee; --muted: #aaa; --hash: #666; --shadow: rgba(0,0,0,.4); }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 2rem; gap: 2rem; transition: background .2s, color .2s; }
    h1 { margin: 0; font-size: 1.25rem; }
    .controls { display: flex; align-items: center; gap: 1rem; }
    .grid { display: flex; flex-wrap: wrap; gap: 2rem; justify-content: center; }
    .card { background: var(--card); border-radius: 12px; padding: 1.25rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; box-shadow: 0 1px 4px var(--shadow); width: 200px; transition: background .2s; }
    .card img { width: 180px; height: 180px; border-radius: 10px; }
    .card code { font-size: 0.8rem; color: var(--muted); }
    button { padding: 0.5rem 1.5rem; font-size: 1rem; border-radius: 6px; border: none; background: #4f46e5; color: #fff; cursor: pointer; }
    button:hover { background: #4338ca; }
    .theme-btn { padding: 0.4rem 0.9rem; font-size: 0.9rem; border-radius: 6px; border: 1px solid var(--muted); background: transparent; color: var(--text); cursor: pointer; }
    .hash { font-size: 0.7rem; color: var(--hash); font-family: monospace; word-break: break-all; max-width: 500px; text-align: center; }
  </style>
</head>
<body>
  <h1>Gravatar Default Avatar Styles</h1>
  <div class="controls">
    <button onclick="randomize()">Randomize hash</button>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Dark</button>
  </div>
  <p class="hash" id="hashDisplay"></p>
  <div class="grid" id="grid"></div>

  <script>
    const TYPES = ['mp', 'identicon', 'monsterid', 'wavatar', 'retro', 'robohash'];

    function randomHex() {
      return Array.from(crypto.getRandomValues(new Uint8Array(16)))
        .map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function randomize() {
      const hash = randomHex();
      document.getElementById('hashDisplay').textContent = hash;
      document.getElementById('grid').innerHTML = TYPES.map(type => `
        <div class="card">
          <img src="https://www.gravatar.com/avatar/${hash}?d=${type}&s=180&r=g" alt="${type}">
          <code>d=${type}</code>
        </div>
      `).join('');
    }

    function toggleTheme() {
      const isDark = document.documentElement.dataset.theme === 'dark';
      document.documentElement.dataset.theme = isDark ? '' : 'dark';
      document.getElementById('themeBtn').textContent = isDark ? 'Dark' : 'Light';
    }

    randomize();
  </script>
</body>
</html>
