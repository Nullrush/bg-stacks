# .github/workflows/pr-env-deploy.yml
name: Deploy PR Environment

on:
  issue_comment:
    types: [created]

concurrency:
  group: container-app-ca-bgstacks-prod
  cancel-in-progress: false

# Minimal permissions — no packages: write (image was already pushed by pr-image-build.yml)
permissions:
  contents: read
  pull-requests: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
      issues: write
      contents: read
    # Only run on PR comments from authorized users — unauthorized → job skipped (not failed)
    if: |
      github.event.issue.pull_request != null && (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    steps:
      - name: Get comment body
        id: comment
        uses: actions/github-script@v7
        with:
          script: core.setOutput('body', context.payload.comment.body);

      - name: Parse command
        id: parse
        env:
          BODY: ${{ steps.comment.outputs.body }}
        run: |
          if [[ "$BODY" =~ ^/deploy-test-env($|[[:space:]]) ]]; then
            echo "match=true" >> $GITHUB_OUTPUT
            # Strip command, remove --reset flag, trim whitespace to get optional slug
            SLUG=$(echo "$BODY" | sed 's|^/deploy-test-env||' | sed 's/--reset//g' | tr '[:upper:]' '[:lower:]' | tr -s ' ' | xargs)
            # Validate slug format (lowercase kebab: a-z0-9 segments separated by hyphens)
            if [[ -n "$SLUG" && ! "$SLUG" =~ ^[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
              echo "Invalid slug format: '$SLUG' — must be lowercase alphanumeric kebab-case"
              exit 1
            fi
            echo "slug=$SLUG" >> $GITHUB_OUTPUT
            if echo "$BODY" | grep -q -- '--reset'; then
              echo "reset=true" >> $GITHUB_OUTPUT
            else
              echo "reset=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "match=false" >> $GITHUB_OUTPUT
          fi

      - name: React with eyes
        if: steps.parse.outputs.match == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes'
            });

      - name: Get PR head SHA and image tag
        if: steps.parse.outputs.match == 'true'
        id: get-sha
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const sha = pr.data.head.sha;
            const shortSha = sha.substring(0, 7);
            const prNumber = context.issue.number;
            const owner = context.repo.owner.toLowerCase();
            const imageTag = `ghcr.io/${owner}/bg-stacks:pr-${prNumber}-${shortSha}`;
            core.setOutput('sha', sha);
            core.setOutput('short_sha', shortSha);
            core.setOutput('pr_number', prNumber);
            core.setOutput('image_tag', imageTag);

      - name: Azure login (OIDC)
        if: steps.parse.outputs.match == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Provision or reset PR environment
        if: steps.parse.outputs.match == 'true'
        id: provision
        env:
          PR_NUMBER: ${{ steps.get-sha.outputs.pr_number }}
          SLUG: ${{ steps.parse.outputs.slug }}
          RESET: ${{ steps.parse.outputs.reset }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          COSMOS_ACCOUNT: ${{ vars.AZURE_COSMOS_ACCOUNT }}
          STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          APP_NAME: ca-bgstacks-prod
        run: |
          DB_NAME="bgstacks-pr-${PR_NUMBER}"
          BLOB_CONTAINER="cache-pr-${PR_NUMBER}"

          # Check if DB already exists
          DB_EXISTS=$(az cosmosdb sql database show \
            --account-name "$COSMOS_ACCOUNT" \
            --resource-group "$RG" \
            --name "$DB_NAME" \
            --query name --output tsv 2>/dev/null || echo "")

          if [[ "$RESET" == "true" ]]; then
            echo "Reset requested — tearing down existing environment"
            # Find labeled revision before removing the label, then deactivate it
            EXISTING_REV=$(az containerapp revision list -n "$APP_NAME" -g "$RG" \
              --output json 2>/dev/null | \
              jq -r ".[] | select(.properties.label == \"pr-${PR_NUMBER}\") | .name" || echo "")
            az containerapp revision label remove -n "$APP_NAME" -g "$RG" --label "pr-${PR_NUMBER}" 2>/dev/null || true
            if [[ -n "$EXISTING_REV" ]]; then
              az containerapp revision deactivate -n "$APP_NAME" -g "$RG" \
                --revision "$EXISTING_REV" 2>/dev/null || true
            fi
            # Delete Cosmos database (all containers inside are also deleted)
            if [[ -n "$DB_EXISTS" ]]; then
              az cosmosdb sql database delete \
                --account-name "$COSMOS_ACCOUNT" \
                --resource-group "$RG" \
                --name "$DB_NAME" \
                --yes
            fi
            # Delete blob container
            az storage container delete \
              --account-name "$STORAGE_ACCOUNT" \
              --name "$BLOB_CONTAINER" \
              --auth-mode login 2>/dev/null || true
            DB_EXISTS=""
          fi

          if [[ -z "$DB_EXISTS" ]]; then
            echo "Creating Cosmos database $DB_NAME with shared autoscale"
            az cosmosdb sql database create \
              --account-name "$COSMOS_ACCOUNT" \
              --resource-group "$RG" \
              --name "$DB_NAME" \
              --max-throughput 1000

            for CONTAINER_NAME in usertags events game-details game-stats; do
              case "$CONTAINER_NAME" in
                usertags)    PKEY="/userId" ; TTL="" ;;
                events)      PKEY="/slug"   ; TTL="" ;;
                game-details) PKEY="/id"   ; TTL="" ;;
                game-stats)  PKEY="/id"    ; TTL="--ttl 86400" ;;
              esac
              az cosmosdb sql container create \
                --account-name "$COSMOS_ACCOUNT" \
                --resource-group "$RG" \
                --database-name "$DB_NAME" \
                --name "$CONTAINER_NAME" \
                --partition-key-path "$PKEY" \
                $TTL
            done

            az storage container create \
              --account-name "$STORAGE_ACCOUNT" \
              --name "$BLOB_CONTAINER" \
              --auth-mode login

            echo "fresh=true" >> $GITHUB_OUTPUT

            # Seed event if slug provided
            if [[ -n "$SLUG" ]]; then
              echo "Seeding event $SLUG from prod"
              PROD_DB="bgstacks"
              ITEM=$(az cosmosdb sql item show \
                --account-name "$COSMOS_ACCOUNT" \
                --resource-group "$RG" \
                --database-name "$PROD_DB" \
                --container-name "events" \
                --partition-key-value "$SLUG" \
                --id "$SLUG" \
                --query resource \
                --output json 2>/dev/null || echo "")
              if [[ -n "$ITEM" && "$ITEM" != "null" ]]; then
                echo "$ITEM" | jq 'del(._rid, ._self, ._etag, ._attachments, ._ts)' > /tmp/event-doc.json
                az cosmosdb sql item create \
                  --account-name "$COSMOS_ACCOUNT" \
                  --resource-group "$RG" \
                  --database-name "$DB_NAME" \
                  --container-name "events" \
                  --body @/tmp/event-doc.json 2>/dev/null || \
                az cosmosdb sql item replace \
                  --account-name "$COSMOS_ACCOUNT" \
                  --resource-group "$RG" \
                  --database-name "$DB_NAME" \
                  --container-name "events" \
                  --partition-key-value "$SLUG" \
                  --id "$SLUG" \
                  --body @/tmp/event-doc.json
                echo "seeded=true" >> $GITHUB_OUTPUT
              else
                echo "Event $SLUG not found in prod — skipping seed"
                echo "seeded=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "seeded=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Database exists — update path"
            echo "fresh=false" >> $GITHUB_OUTPUT
            echo "seeded=false" >> $GITHUB_OUTPUT
            # Ensure blob container exists (guard against partial teardown)
            az storage container create \
              --account-name "$STORAGE_ACCOUNT" \
              --name "$BLOB_CONTAINER" \
              --auth-mode login 2>/dev/null || true
          fi

      - name: Deploy PR revision
        if: steps.parse.outputs.match == 'true'
        env:
          PR_NUMBER: ${{ steps.get-sha.outputs.pr_number }}
          SHORT_SHA: ${{ steps.get-sha.outputs.short_sha }}
          IMAGE_TAG: ${{ steps.get-sha.outputs.image_tag }}
          SLUG: ${{ steps.parse.outputs.slug }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP_NAME: ca-bgstacks-prod
        run: |
          DB_NAME="bgstacks-pr-${PR_NUMBER}"
          BLOB_CONTAINER="cache-pr-${PR_NUMBER}"

          ENV_VARS=(
            "Cosmos__DatabaseId=${DB_NAME}"
            "Blob__CacheContainer=${BLOB_CONTAINER}"
            "Events__PathBasedRouting=true"
          )
          if [[ -n "$SLUG" ]]; then
            ENV_VARS+=("Events__DevFallbackSlug=${SLUG}")
          fi

          az containerapp update \
            --name "$APP_NAME" \
            --resource-group "$RG" \
            --image "$IMAGE_TAG" \
            --revision-suffix "pr-${PR_NUMBER}-${SHORT_SHA}-${GITHUB_RUN_NUMBER}" \
            --target-label "pr-${PR_NUMBER}" \
            --set-env-vars "${ENV_VARS[@]}"

      - name: Apply PR label to revision
        if: steps.parse.outputs.match == 'true'
        env:
          PR_NUMBER: ${{ steps.get-sha.outputs.pr_number }}
          SHORT_SHA: ${{ steps.get-sha.outputs.short_sha }}
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          APP_NAME: ca-bgstacks-prod
        run: |
          # --target-label may not create a brand-new label on first deploy; explicit
          # revision label add is the reliable fallback. If --target-label already
          # applied it, the CLI moves the label to the same revision (effectively a no-op).
          az containerapp revision label add \
            -n "$APP_NAME" -g "$RG" \
            --revision "${APP_NAME}--pr-${PR_NUMBER}-${SHORT_SHA}-${GITHUB_RUN_NUMBER}" \
            --label "pr-${PR_NUMBER}"

      - name: Get PR environment URL
        if: steps.parse.outputs.match == 'true'
        id: get-url
        env:
          APP_NAME: ca-bgstacks-prod
          RG: ${{ vars.AZURE_RESOURCE_GROUP }}
          PR_NUMBER: ${{ steps.get-sha.outputs.pr_number }}
        run: |
          # Label URL format: <app>--<label>.<default-domain>
          FQDN=$(az containerapp show -n "$APP_NAME" -g "$RG" \
            --query properties.configuration.ingress.fqdn --output tsv)
          # Replace the first segment: ca-bgstacks-prod → ca-bgstacks-prod--pr-{n}
          LABEL_FQDN="${APP_NAME}--pr-${PR_NUMBER}.${FQDN#*.}"
          echo "url=https://${LABEL_FQDN}" >> $GITHUB_OUTPUT

      - name: Post result comment
        if: steps.parse.outputs.match == 'true'
        uses: actions/github-script@v7
        env:
          PR_ENV_URL: ${{ steps.get-url.outputs.url }}
          SHORT_SHA: ${{ steps.get-sha.outputs.short_sha }}
          FRESH: ${{ steps.provision.outputs.fresh }}
          SEEDED: ${{ steps.provision.outputs.seeded }}
          SLUG: ${{ steps.parse.outputs.slug }}
          RESET: ${{ steps.parse.outputs.reset }}
        with:
          script: |
            const url = process.env.PR_ENV_URL;
            const sha = process.env.SHORT_SHA;
            const fresh = process.env.FRESH === 'true';
            const seeded = process.env.SEEDED === 'true';
            const slug = process.env.SLUG;
            const reset = process.env.RESET === 'true';

            let dataLine;
            if (reset) {
              dataLine = fresh && seeded
                ? `♻️ Database reset and seeded with event \`${slug}\``
                : `♻️ Database reset (empty)`;
            } else if (fresh) {
              dataLine = seeded
                ? `🌱 Fresh database seeded with event \`${slug}\``
                : slug
                  ? `⚠️ Fresh database — event \`${slug}\` not found in prod; no data seeded`
                  : `🆕 Fresh empty database (no slug provided — use \`/event/{slug}/\` paths to reach events)`;
            } else {
              dataLine = `📦 Existing database kept`;
            }

            const body = [
              `### PR Environment deployed`,
              ``,
              `| | |`,
              `|---|---|`,
              `| URL | ${url} |`,
              `| Image | \`${sha}\` |`,
              `| Data | ${dataLine} |`,
              ``,
              `> **Note:** OAuth sign-in will fail (redirect URIs registered to \`bgstacks.com\`). Tags sync and auth-gated endpoints cannot be tested from this URL.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
