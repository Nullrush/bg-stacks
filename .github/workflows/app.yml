name: Build and Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'src/BgStacks.Web/Dockerfile'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bg-stacks

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Warn if infra also changed
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -qE '^infra/'; then
            echo "::warning::Both infra/ and src/ changed in this push — infra.yml and app.yml will race. Use separate commits: infra first, app second."
          fi
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - name: Run tests
        run: |
          dotnet test bg-stacks.slnx \
            --logger "trx;LogFileName=results.trx" \
            --logger "console;verbosity=normal" 2>&1 | tee test-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          {
            echo "### Test Results"
            echo '```'
            grep -E "Failed|Passed|Skipped|Total|Error" test-output.txt | tail -3
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE
      - name: Publish test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase image name
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/BgStacks.Web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App image
        run: |
          SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$(git rev-parse --short HEAD)"
          az containerapp update \
            --name ca-bgstacks-prod \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image "$SHA_TAG"
      - name: Post deployment summary
        if: success()
        run: |
          SHA_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$(git rev-parse --short HEAD)"
          PORTAL_URL="https://portal.azure.com/#resource/subscriptions/${{ vars.AZURE_SUBSCRIPTION_ID }}/resourceGroups/${{ vars.AZURE_RESOURCE_GROUP }}/providers/Microsoft.App/containerApps/ca-bgstacks-prod"
          {
            echo "### Deployed"
            echo "| | |"
            echo "|---|---|"
            echo "| Image | \`$SHA_TAG\` |"
            echo "| Container App | [View in Azure Portal]($PORTAL_URL) |"
          } >> $GITHUB_STEP_SUMMARY
